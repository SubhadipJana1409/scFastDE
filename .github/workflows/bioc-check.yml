on:
  push:
    branches: [main, devel]
  pull_request:
    branches: [main, devel]

name: Bioc-check

jobs:
  bioc-check:
    runs-on: ubuntu-latest
    container: bioconductor/bioconductor_docker:devel

    env:
      R_REMOTES_NO_ERRORS_FROM_WARNINGS: true
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Query dependencies
        run: |
          install.packages('remotes')
          saveRDS(remotes::dev_package_deps(dependencies = TRUE),
                  ".github/depends.Rds", version = 2)
          writeLines(sprintf("R-%i.%i",
                             getRversion()$major,
                             getRversion()$minor),
                     ".github/R-version")
        shell: Rscript {0}

      - name: Cache R packages
        uses: actions/cache@v3
        with:
          path: /usr/local/lib/R/host-site-library
          key: ${{ runner.os }}-${{ hashFiles('.github/R-version') }}-1-${{ hashFiles('.github/depends.Rds') }}
          restore-keys: ${{ runner.os }}-${{ hashFiles('.github/R-version') }}-1-

      - name: Install dependencies
        run: |
          remotes::install_deps(dependencies = TRUE,
                                repos = BiocManager::repositories(),
                                Ncpus = 2L)
        shell: Rscript {0}

      - name: Install BiocCheck
        run: BiocManager::install("BiocCheck")
        shell: Rscript {0}

      - name: Build package
        run: R CMD build .

      - name: Run R CMD check
        run: R CMD check --no-manual --no-build-vignettes *.tar.gz

      - name: Run BiocCheck
        run: |
          BiocCheck::BiocCheck(
            dir(pattern = "\\.tar\\.gz$"),
            `new-package` = TRUE
          )
        shell: Rscript {0}

      - name: Upload check results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: check-results
          path: check
