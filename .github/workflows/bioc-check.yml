on:
  push:
    branches: [main, devel]
  pull_request:
    branches: [main, devel]

name: Bioc-check

jobs:
  bioc-check:
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'devel'

      - name: Setup Bioconductor
        run: |
          install.packages("BiocManager")
          BiocManager::install(version = "devel", ask = FALSE)
        shell: Rscript {0}

      - name: Install rlang and ggplot2 binaries
        run: |
          install.packages(c("rlang", "ggplot2"), type = "binary")
        shell: Rscript {0}

      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::BiocCheck
            any::BiocStyle
            any::rcmdcheck

      - name: Build package
        run: R CMD build .

      - name: Run R CMD check
        run: R CMD check --no-manual *.tar.gz

      - name: Run BiocCheck
        run: |
          BiocCheck::BiocCheck(
            dir(pattern = "\\.tar\\.gz$"),
            `new-package` = TRUE
          )
        shell: Rscript {0}

      - name: Upload check results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: check-results
          path: |
            *.Rcheck