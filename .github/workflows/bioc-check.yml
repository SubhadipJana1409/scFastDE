on:
  push:
    branches: [main, devel]
  pull_request:
    branches: [main, devel]

name: Bioc-check

jobs:
  bioc-check:
    runs-on: ubuntu-latest
    container: bioconductor/bioconductor_docker:devel

    env:
      R_REMOTES_NO_ERRORS_FROM_WARNINGS: true
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libpng-dev \
            libtiff-dev \
            libjpeg-dev

      - name: Install R dependencies
        run: |
          install.packages("remotes")
          remotes::install_deps(
              dependencies = TRUE,
              repos        = BiocManager::repositories(),
              Ncpus        = 2L
          )
        shell: Rscript {0}

      - name: Install BiocCheck
        run: |
          BiocManager::install("BiocCheck", update = FALSE, ask = FALSE)
        shell: Rscript {0}

      - name: Verify key dependencies
        run: |
          stopifnot(requireNamespace("ggplot2",  quietly = TRUE))
          stopifnot(requireNamespace("rlang",    quietly = TRUE))
          stopifnot(requireNamespace("limma",    quietly = TRUE))
          stopifnot(requireNamespace("Matrix",   quietly = TRUE))
          stopifnot(requireNamespace("BiocCheck",quietly = TRUE))
          cat("All dependencies verified.\n")
        shell: Rscript {0}

      - name: Build package
        run: R CMD build .

      - name: Run R CMD check
        run: R CMD check --no-manual *.tar.gz

      - name: Run BiocCheck
        run: |
          BiocCheck::BiocCheck(
              dir(pattern = "\\.tar\\.gz$"),
              `new-package` = TRUE
          )
        shell: Rscript {0}

      - name: Upload check results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: check-results
          path: |
            *.Rcheck
            *.BiocCheck