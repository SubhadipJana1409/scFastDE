on:
  push:
    branches: [main, devel]
  pull_request:
    branches: [main, devel]

name: Bioc-check

jobs:
  bioc-check:
    runs-on: ubuntu-latest
    container: bioconductor/bioconductor_docker:devel

    env:
      R_REMOTES_NO_ERRORS_FROM_WARNINGS: true
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev

      - name: Set CRAN repo globally
        run: |
          echo 'options(repos = c(CRAN = "https://cloud.r-project.org"))' >> /usr/local/lib/R/etc/Rprofile.site

      - name: Install R dependencies
        run: |
          options(repos = c(CRAN = "https://cloud.r-project.org",
                            BiocManager::repositories()))
          install.packages("remotes")
          remotes::install_deps(dependencies = TRUE, Ncpus = 2L)
          BiocManager::install("BiocCheck", update = FALSE, ask = FALSE)

          # Verify critical deps
          stopifnot(requireNamespace("ggplot2", quietly = TRUE))
          stopifnot(requireNamespace("rlang", quietly = TRUE))
          cat("All dependencies installed successfully.\n")
        shell: Rscript {0}

      - name: Build package
        run: R CMD build .

      - name: Run R CMD check
        run: R CMD check --no-manual *.tar.gz

      - name: Run BiocCheck
        run: |
          BiocCheck::BiocCheck(
            dir(pattern = "\\.tar\\.gz$"),
            `new-package` = TRUE
          )
        shell: Rscript {0}

      - name: Upload check results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: check-results
          path: |
            *.Rcheck
