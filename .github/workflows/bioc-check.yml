on:
  push:
    branches: [main, devel]
  pull_request:
    branches: [main, devel]

name: Bioc-check

jobs:
  bioc-check:
    runs-on: ubuntu-latest
    container: bioconductor/bioconductor_docker:devel

    env:
      R_REMOTES_NO_ERRORS_FROM_WARNINGS: true
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev

      - name: Install R dependencies
        run: |
          # Ensure CRAN + Bioc repos are both set
          options(repos = c(
            CRAN = "https://cloud.r-project.org",
            BiocManager::repositories()
          ))
          cat("Repos:\n")
          print(getOption("repos"))

          # Install remotes first
          install.packages("remotes", repos = "https://cloud.r-project.org")

          # Install all Imports + Suggests
          remotes::install_deps(dependencies = TRUE, Ncpus = 2L)

          # Install BiocCheck
          BiocManager::install("BiocCheck", update = FALSE, ask = FALSE)
        shell: Rscript {0}

      - name: Build package
        run: R CMD build .

      - name: Run R CMD check
        run: R CMD check --no-manual *.tar.gz

      - name: Run BiocCheck
        run: |
          BiocCheck::BiocCheck(
            dir(pattern = "\\.tar\\.gz$"),
            `new-package` = TRUE
          )
        shell: Rscript {0}

      - name: Upload check results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: check-results
          path: |
            *.Rcheck
